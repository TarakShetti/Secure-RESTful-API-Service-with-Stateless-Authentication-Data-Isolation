{% extends "base.html" %}

{% block title %}Dashboard | Task Manager{% endblock %}

{% block content %}
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1 class="logo">Tasks</h1>
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme" title="Toggle Theme">
                <!-- SVG injected via JS depending on theme -->
                <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active">My Tasks</a>
            <a href="#" class="nav-item" id="logout-btn">Log Out</a>
        </nav>
        <div class="user-info">
            <span id="user-email-display"></span>
        </div>
    </aside>

    <main class="main-content">
        <header class="main-header">
            <h2>My Tasks</h2>
            <button id="new-task-btn" class="btn-primary">New Task</button>
        </header>
        
        <div class="tasks-container">
            <!-- Loading State -->
            <div id="loading-state" class="empty-state">
                <div class="spinner"></div>
                <p>Loading tasks...</p>
            </div>
            
            <!-- Empty State -->
            <div id="empty-state" class="empty-state hidden">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                <p>No tasks yet. Create one to get started.</p>
            </div>

            <!-- Task List -->
            <ul id="task-list" class="task-list hidden">
                <!-- Tasks injected via JS -->
            </ul>
        </div>
    </main>

    <!-- New Task Modal -->
    <div id="task-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Create Task</h3>
                <button class="close-modal icon-btn">&times;</button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <div class="form-group">
                    <label for="task-title">Title</label>
                    <input type="text" id="task-title" required placeholder="What needs to be done?">
                </div>
                <div class="form-group">
                    <label for="task-desc">Description</label>
                    <textarea id="task-desc" rows="3" placeholder="Add some details..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary close-modal">Cancel</button>
                    <button type="submit" class="btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
